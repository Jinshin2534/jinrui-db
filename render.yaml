# Render Blueprint。リポジトリを Render に繋ぎ New → Blueprint で本サービスを作成。
# 同梱シード(data/*.hrfl)から起動時にPGliteを再構築するので外部DBは不要(DATABASE_URLは設定しない)。
# マネージドPostgresに載せたい場合のみ、Renderダッシュボードで環境変数 DATABASE_URL を後から追加する。
services:
  - type: web
    name: jinrui-db
    runtime: node
    rootDir: tools
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node boot.mjs
    envVars:
      # マネージドPostgres(Neon/Supabase)の接続文字列。Renderのダッシュボードで設定(sync:false)。
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: "24"
